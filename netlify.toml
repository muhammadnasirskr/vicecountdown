# netlify.toml — Vice Countdown
# Drag-and-drop or Git deploy; publishes the folder as-is (no build step).

[build]
  publish = "."

# Long-cache the fingerprint-safe static assets (images/fonts/etc).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# HTML should always revalidate so edits (dates, ad keys) go live immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sensible baseline security headers (do not block third-party ad scripts).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Netlify automatically serves 404.html for unknown paths — no redirect needed.
