<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Vice Countdown">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0b2e"/><stop offset="1" stop-color="#0a0612"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe14d"/>
      <stop offset="0.5" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#ff2d95"/>
    </linearGradient>
    <clipPath id="r"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="64" height="64" fill="url(#bg)"/>
    <circle cx="32" cy="29" r="17" fill="url(#sun)"/>
    <g fill="#0a0612">
      <rect x="10" y="30" width="44" height="2.4"/>
      <rect x="10" y="35" width="44" height="2.6"/>
      <rect x="10" y="40" width="44" height="3"/>
    </g>
    <rect x="0" y="47" width="64" height="2.4" fill="#00e5ff"/>
    <circle cx="52" cy="12" r="3" fill="#ff2d95"/>
  </g>
</svg>
